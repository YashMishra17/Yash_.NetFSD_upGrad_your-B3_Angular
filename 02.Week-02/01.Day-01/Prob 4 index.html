<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Expense Tracker</title>
</head>
<body onload="initDB()">

    <h2>Mini Expense Tracker</h2>

    <label>Expense Title:</label><br>
    <input type="text" id="title"><br><br>

    <label>Amount:</label><br>
    <input type="number" id="amount"><br><br>

    <label>Date:</label><br>
    <input type="date" id="date"><br><br>

    <button onclick="addExpense()">Add Expense</button>
    <button onclick="viewExpenses()">View Expenses</button>
    <button onclick="deleteExpenses()">Delete All Expenses</button>

    <h3>Expense List</h3>
    <ul id="expenseList"></ul>

    <script>
        let db;

        function initDB() {
            db = openDatabase(
                "ExpenseDB",
                "1.0",
                "Expense Tracker Database",
                2 * 1024 * 1024
            );

            db.transaction(function (tx) {
                tx.executeSql(
                    "CREATE TABLE IF NOT EXISTS expenses (id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT, amount REAL, date TEXT)",
                    [],
                    function () {},
                    function (tx, error) {
                        console.log("Table creation error:", error.message);
                    }
                );
            });
        }

        function addExpense() {
            let title = document.getElementById("title").value;
            let amount = document.getElementById("amount").value;
            let date = document.getElementById("date").value;

            if (title === "" || amount === "" || date === "") {
                alert("All fields are required");
                return;
            }

            db.transaction(function (tx) {
                tx.executeSql(
                    "INSERT INTO expenses (title, amount, date) VALUES (?, ?, ?)",
                    [title, amount, date],
                    function () {
                        viewExpenses();
                    },
                    function (tx, error) {
                        console.log("Insert error:", error.message);
                    }
                );
            });
        }

        function viewExpenses() {
            db.transaction(function (tx) {
                tx.executeSql(
                    "SELECT * FROM expenses",
                    [],
                    function (tx, result) {
                        let list = document.getElementById("expenseList");
                        list.innerHTML = "";

                        for (let i = 0; i < result.rows.length; i++) {
                            let row = result.rows.item(i);
                            let li = document.createElement("li");
                            li.innerText = `${row.title} - ₹${row.amount} (${row.date})`;
                            list.appendChild(li);
                        }
                    },
                    function (tx, error) {
                        console.log("Select error:", error.message);
                    }
                );
            });
        }

        function deleteExpenses() {
            db.transaction(function (tx) {
                tx.executeSql(
                    "DELETE FROM expenses",
                    [],
                    function () {
                        document.getElementById("expenseList").innerHTML = "";
                    },
                    function (tx, error) {
                        console.log("Delete error:", error.message);
                    }
                );
            });
        }
    </script>

</body>
</html>
