<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
</head>
<body>

<h2>Task Manager</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="handleAdd()">Add Task</button>
<button onclick="handleList()">List Tasks</button>

<div id="output"></div>

<script type="module">

import {
  addTaskCallback,
  listTasksCallback,
  addTaskPromise,
  listTasksPromise,
  addTask,
  listTasks
} from './taskManager.js';


/* ---------------------------
   Callback Usage
---------------------------- */

const handleAddCallback = () => {
  const task = document.getElementById("taskInput").value;

  addTaskCallback(task, (message) => {
    document.getElementById("output").innerHTML = message;
  });
};


/* ---------------------------
   Promise Usage
---------------------------- */

const handleAddPromise = () => {
  const task = document.getElementById("taskInput").value;

  addTaskPromise(task)
    .then(message => {
      document.getElementById("output").innerHTML = message;
    });
};


/* ---------------------------
   Async/Await Usage
---------------------------- */

window.handleAdd = async () => {
  const task = document.getElementById("taskInput").value;

  const message = await addTask(task);
  document.getElementById("output").innerHTML = message;
};

window.handleList = async () => {
  const tasks = await listTasks();

  const formatted = tasks.map(
    (t, i) => `<p>${i + 1}. ${t}</p>`
  ).join("");

  document.getElementById("output").innerHTML = formatted;
};

</script>

</body>
</html>
