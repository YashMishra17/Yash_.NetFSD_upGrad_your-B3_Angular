<!DOCTYPE html>
<html>
<head>
    <title>Electronics Store</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <h2 class="text-center mb-4">Online Electronics Store</h2>

    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://www.istockphoto.com/photos/new-apple-laptop" class="card-img-top" alt="Laptop">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">High-performance laptop</p>
                    <p class="fw-bold text-primary">$800</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm me-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/250" class="card-img-top" alt="Mobile">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text">Latest 5G smartphone</p>
                    <p class="fw-bold text-primary">$500</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm me-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/250" class="card-img-top" alt="Headphones">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text">Noise cancelling headphones</p>
                    <p class="fw-bold text-primary">$150</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm me-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/250" class="card-img-top" alt="Smart Watch">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text">Fitness tracking watch</p>
                    <p class="fw-bold text-primary">$200</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm me-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
