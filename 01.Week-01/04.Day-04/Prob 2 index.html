<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grade Evaluator</title>
</head>
<body>

    <h1>Student Grade Evaluator</h1>

    <script>
        // 1. Accept marks as a variable
        let marks = 68;   // change this value to test

        // 2. Grade evaluation using if–else
        if (marks >= 75) {
            document.write("Grade: A");
        } else if (marks >= 60) {
            document.write("Grade: B");
        } else if (marks >= 40) {
            document.write("Grade: C");
        } else {
            document.write("Fail");
        }

        // Optional: also log to console
        console.log("Marks:", marks);
    </script>

</body>
</html>
