<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Analysis Tool</title>
</head>
<body>

    <h1>Number Analysis Tool</h1>

    <script>
        // Store number
        let num = 7;   // change value to test

        // 1. Check Positive or Negative using ternary operator
        let sign = (num >= 0) ? "Positive" : "Negative";
        console.log("Number is:", sign);

        // 2. Check Even or Odd using if–else
        if (num % 2 === 0) {
            console.log("Number is Even");
        } else {
            console.log("Number is Odd");
        }

        // 3. Print numbers from 1 to the given number
        console.log("Numbers from 1 to " + num + ":");
        for (let i = 1; i <= num; i++) {
            console.log(i);
        }
    </script>

</body>
</html>
