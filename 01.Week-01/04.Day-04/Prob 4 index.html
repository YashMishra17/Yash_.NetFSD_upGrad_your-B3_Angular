<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic Signal Simulator</title>
</head>
<body>

    <h1>Traffic Signal Simulator</h1>

    <script>
        // Store signal color
        let signal = "yellow";   // try: "red", "green", or invalid value

        // Switch-case logic
        switch (signal) {
            case "red":
                console.log("Stop");
                break;

            case "yellow":
                console.log("Get Ready");
                break;

            case "green":
                console.log("Go");
                break;

            default:
                console.log("Invalid signal color");
        }
    </script>

</body>
</html>
