<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <aside class="sidebar">
            <h2>Admin Panel</h2>
            <nav>
                <a href="#">Dashboard</a>
                <a href="#">Users</a>
                <a href="#">Reports</a>
                <a href="#">Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Dashboard Overview</h1>

            <div class="cards">
                <div class="card">
                    <h3>Users</h3>
                    <p>1,250</p>
                </div>
                <div class="card">
                    <h3>Sales</h3>
                    <p>₹85,000</p>
                </div>
                <div class="card">
                    <h3>Orders</h3>
                    <p>320</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
